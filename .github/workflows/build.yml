name: build-win

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      #-
      #  name: Setup Go
      #  uses: actions/setup-go@v6
      #  with:
      #    go-version: '1.25.5'
      #    go-download-base-url: 'https://github.com/XTLS/go-win7/releases/download/patched-1.25.5/go-for-win7-linux-amd64.zip'
      - name: Install Custom Go (Win7 patched)
        run: |
          # dl
          curl -L https://github.com/XTLS/go-win7/releases/download/patched-1.25.7/go-for-win7-linux-amd64.zip -o go-custom.zip

          # unpack
          mkdir -p custom_go
          unzip -q go-custom.zip -d ./custom_go
          
          # set env vars
          echo "$(pwd)/custom_go/bin" >> $GITHUB_PATH
          echo "GOROOT=$(pwd)/custom_go" >> $GITHUB_ENV

          #go run hello.go
          echo "$(pwd)"
          go version
          cd "$(pwd)/custom_go/bin"
          echo "$(pwd)"
          go version
      -
        name: Read tag
        id: tag
        #get ver from Tag
        #run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        #get ver from Branch
        run: echo "tag=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
      -
        name: Check version value
        run: |
          echo "Полная ссылка: $GITHUB_REF"
          echo "Извлеченный тег: ${{steps.tag.outputs.tag}}"
      -
        name: Build
        run: >-
          make -j $(nproc) allwin
          VERSION=${{steps.tag.outputs.tag}}
      #-
      #  name: Release
      #  uses: softprops/action-gh-release@v1
      #  with:
      #    files: bin/*
      #    fail_on_unmatched_files: true
      #    generate_release_notes: true
      -
        name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: opera-proxy-binaries-win
          path: bin/*

